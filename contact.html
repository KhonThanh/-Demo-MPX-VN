<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon | Liên hệ</title>
    <link rel="icon" type="image/png" href="./img/logo/logo-favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- <link rel="stylesheet" href="../css/style.min.css"> -->
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/utility.css">
</head>

<body>
    <header class="container-f bg-black" data-include="./component/header.html"></header>
    <main class="container-f flex flex-col center-hor">
        <section class="flex bg-gray container-f ">
            <div class="container-l nav-bar__container">
                <a href="javascript:void(0)" class="nav-bar__item">Trang chủ</a>
                <a href="javascript:void(0)" class="nav-bar__item">Liên hệ</a>
            </div>
        </section>
        <main class="container-f flex flex-col center-hor pos-rel ">
            <section class="container-f container-padding bg-white">
                <div class="container-l flex flex-wrap gap-20">

                    <div class="contact-section__container  item-padding-40 flex flex-col gap-30 border-radius-10">
                        <div class="flex flex-col gap-10">
                            <h2 class="uppercase bold">Có bất kỳ câu hỏi</h2>
                            <div class="title-border-bottom"></div>
                        </div>

                        <div class="flex flex-col gap-20">
                            <div class="custom-item__low item-padding-20 flex center-ver gap-20 border-radius-10">
                                <div class="icon-box-50">
                                    <img src="./img/icon/phone-icon.svg" class="img-icon" alt="Phone">
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-color-deactive text-sm">Gọi ngay cho chúng tôi</span>
                                    <span class="bold">(+84) 94 2710025</span>
                                </div>
                            </div>

                            <div class="custom-item__low item-padding-20 flex center-ver gap-20 border-radius-10">
                                <div class="icon-box-50">
                                    <img src="./img/icon/mail-icon.svg" class="img-icon" alt="Email">
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-color-deactive text-sm">Email Cho Chúng Tôi 24/7</span>
                                    <span class="bold">info@mpx.com</span>
                                </div>
                            </div>

                            <div class="custom-item__low item-padding-20 flex center-ver gap-20 border-radius-10">
                                <div class="icon-box-50">
                                    <img src="./img/icon/map-icon.svg" class="img-icon" alt="Map">
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-color-deactive text-sm">Địa Chỉ Trung Tâm</span>
                                    <span class="bold">B8/255E, Ấp 2, Xã Phong Phú, Huyện Bình Chánh, TP.HCM, Việt
                                        Nam</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div
                        class="contact-section__container contact-form__background item-padding-40 bg-white-secondary border-radius-10">
                        <form class="flex flex-col gap-20 js-validate-form">
                            <div class="flex flex-col gap-10">
                                <span class="text-color-deactive italic text-sm">Liên hệ</span>
                                <h2 class="uppercase bold">Liên hệ với chúng tôi</h2>
                                <div class="title-border-bottom"></div>
                            </div>

                            <div class="flex flex-wrap gap-20">
                                <div class="flex-1 flex flex-col gap-10 form-group">
                                    <label class="bold">Họ và tên</label>
                                    <input type="text" placeholder="John Architect" required
                                        data-msg="Vui lòng nhập họ tên"
                                        class="item-padding-10-20 border-radius-5 bg-white border-none fill-view">
                                    <span class="error-msg text-red text-xs"></span>
                                </div>
                                <div class="flex-1 flex flex-col gap-10 form-group">
                                    <label class="bold">Email</label>
                                    <input type="email" placeholder="name@architect.core" required
                                        class="item-padding-10-20 border-radius-5 bg-white border-none fill-view">
                                    <span class="error-msg text-red text-xs"></span>
                                </div>
                            </div>

                            <div class="flex flex-wrap gap-20">
                                <div class="flex-1 flex flex-col gap-10 form-group">
                                    <label class="bold">Số điện thoại</label>
                                    <input type="text" placeholder="Số điện thoại" required pattern="^[0-9]{10,11}$"
                                        data-msg="SĐT phải có 10-11 số"
                                        class="item-padding-10-20 border-radius-5 bg-white border-none fill-view">
                                    <span class="error-msg text-red text-xs"></span>
                                </div>
                                <div class="flex-1 flex flex-col gap-10 form-group">
                                    <label class="bold">Địa chỉ</label>
                                    <input type="text" placeholder="Địa chỉ" required
                                        class="item-padding-10-20 border-radius-5 bg-white border-none fill-view">
                                    <span class="error-msg text-red text-xs"></span>
                                </div>
                            </div>

                            <div class="flex flex-col gap-10 form-group">
                                <label class="bold">Nội dung</label>
                                <textarea rows="4" required minlength="10" data-msg="Nội dung phải ít nhất 10 ký tự"
                                    class="item-padding-10-20 border-radius-5 bg-white border-none fill-view"></textarea>
                                <span class="error-msg text-red text-xs"></span>
                            </div>

                            <div class="flex flex-col gap-10 form-group">
                                <label class="bold">Mã bảo mật</label>
                                <input type="text" required
                                    class="item-padding-10-20 border-radius-5 bg-white border-none fill-view">
                                <span class="error-msg text-red text-xs"></span>
                            </div>

                            <button type="submit"
                                class="bg-primary text-color-white border-radius-5 bold uppercase cursor-pointer btn-submit-large border-none">
                                Gửi tin nhắn &nbsp; →
                            </button>
                        </form>
                    </div>

                </div>
            </section>
            <section class="container-f container-padding-bottom ">
                <div class="container-l company-map">
                    <iframe class="fill-view border-none"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3920.123456789!2d106.6642711!3d10.692069!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f97b400fd13%3A0x292925fdcdf0f6c0!2zQjgvMjU1RSwg4bqlcCAyLCBQaG9uZyBQaMO6LCBCw6luaCBDaMOhbmgsIEjhu5MgQ2jDrSBNaW5o!5e0!3m2!1svi!2svn!4v1714000000000!5m2!1svi!2svn"
                        height="350" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </section>
        </main>
        <footer class="container-f bg-black item-padding-80-0  center-ver" data-include="./component/footer.html">
        </footer>
        <div class="btntotop__container pos-fixed bg-white" data-include="./component/rolltotop.html" id="btnToTop">
        </div>
        <div class="popup-register__container pos-fixed z-index-2 center-ver center-hor container-f"
            data-include="./component/popup.html"></div>

        <script defer type="text/javascript" src="https://code.jquery.com/jquery-1.11.0.min.js"></script>
        <script defer type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
        <script defer type="text/javascript" src="./js/frontend.js"></script>
</body>

</html>
